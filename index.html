<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Rubik's Cube Solver</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cubejs@0.1.2/lib/cube.min.js"></script>
</head>
<body>

    <h1>3D Rubik's Cube Solver</h1>
    <p>Select a color from the top palette, then left-click directly onto any 3D sticker block to paint it. Use the "Next Face" button to rotate the camera perspective squarely around the sides.</p>

    <div class="palette" id="palette">
        <div class="palette-color c-U selected" data-color="U"></div>
        <div class="palette-color c-L" data-color="L"></div>
        <div class="palette-color c-F" data-color="F"></div>
        <div class="palette-color c-R" data-color="R"></div>
        <div class="palette-color c-B" data-color="B"></div>
        <div class="palette-color c-D" data-color="D"></div>
    </div>

    <div id="canvas-container"></div>

    <div class="controls">
        <button id="snapFaceBtn" class="secondary">Next Face ↺</button>
        <button id="solveBtn">Solve Cube</button>
        <button id="resetBtn" class="secondary">Reset</button>
    </div>

    <div class="player-panel" id="playerPanel">
        <div class="status-text" id="stepStatus">Step 0 of 0</div>
        <div class="move-display" id="currentMove">-</div>
        <div class="player-buttons">
            <button id="prevMoveBtn" class="secondary">Back</button>
            <button id="nextMoveBtn">Next Move →</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
